repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files

-   repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
    -   id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: .*/tests/.*

-   repo: local
    hooks:
    -   id: check-litellm-keys
        name: Check for hardcoded LiteLLM/API keys
        entry: (?i)(LITELLM_API_KEY=|sk-ant-|sk-proj-|sk-or-)
        language: pygrep
        types: [text]
